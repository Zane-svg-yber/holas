<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resumidor de Textos</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c9a96e;
      --accent2: #e8c98a;
      --text: #f0ece4;
      --muted: #888;
      --idea1: #1a2e1a;
      --idea1b: #3a6b3a;
      --idea2: #1a1a2e;
      --idea2b: #3a3a6b;
      --resumen: #2e1a1a;
      --resumenb: #6b3a3a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      max-width: 780px;
      padding: 3.5rem 0 2.5rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent2);
    }

    .subtitle {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.6;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 1.8rem auto 0;
    }

    main {
      width: 100%;
      max-width: 780px;
      position: relative;
      z-index: 1;
    }

    /* Input area */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.3s;
    }

    .input-card:focus-within {
      border-color: var(--accent);
    }

    .input-label {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.8rem;
      display: block;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      line-height: 1.75;
      font-weight: 300;
      resize: none;
      min-height: 200px;
      caret-color: var(--accent);
    }

    textarea::placeholder {
      color: #444;
    }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .char-count {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.01em;
    }

    .btn:hover:not(:disabled) {
      background: var(--accent2);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(201,169,110,0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn svg { transition: transform 0.3s; }
    .btn:hover svg { transform: rotate(15deg); }

    /* Loading state */
    .loader {
      display: none;
      align-items: center;
      gap: 0.8rem;
      padding: 1.2rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1.5rem;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .loader.visible { display: flex; }

    .dots {
      display: flex;
      gap: 4px;
    }

    .dots span {
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Results */
    #results {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    #results.visible {
      display: flex;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      border-radius: 12px;
      padding: 1.6rem 1.8rem;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
    }

    .card-idea1 {
      background: var(--idea1);
      border-color: var(--idea1b);
    }
    .card-idea1::before { background: #6db56d; }

    .card-idea2 {
      background: var(--idea2);
      border-color: var(--idea2b);
    }
    .card-idea2::before { background: #6d6db5; }

    .card-resumen {
      background: var(--resumen);
      border-color: var(--resumenb);
    }
    .card-resumen::before { background: #b56d6d; }

    .card-tag {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-idea1 .card-tag { color: #8ed98e; }
    .card-idea2 .card-tag { color: #8e8ed9; }
    .card-resumen .card-tag { color: #d98e8e; }

    .card-tag svg { flex-shrink: 0; }

    .card-content {
      font-size: 0.97rem;
      line-height: 1.8;
      font-weight: 300;
      color: #ddd;
    }

    .card-resumen .card-content {
      font-size: 0.95rem;
    }

    /* Error */
    .error-msg {
      display: none;
      background: #2e1010;
      border: 1px solid #6b2020;
      border-radius: 10px;
      padding: 1rem 1.4rem;
      color: #e07070;
      font-size: 0.88rem;
    }
    .error-msg.visible { display: block; }

    /* Actions after result */
    .result-actions {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.75rem;
      color: #3a3a3a;
      letter-spacing: 0.05em;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Herramienta de análisis textual</p>
  <h1>Resume cualquier<br/><em>texto al instante</em></h1>
  <p class="subtitle">Pega tu texto y obtén la idea principal, la idea secundaria<br/>y un resumen claro en segundos.</p>
  <div class="divider"></div>
</header>

<main>
  <div class="input-card">
    <label class="input-label" for="inputText">Tu texto</label>
    <textarea id="inputText" placeholder="Pega aquí el texto que deseas analizar y resumir…" oninput="updateCount()"></textarea>
    <div class="input-footer">
      <span class="char-count" id="charCount">0 caracteres</span>
      <button class="btn" id="summarizeBtn" onclick="summarize()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        Analizar texto
      </button>
    </div>
  </div>

  <div class="loader" id="loader">
    <div class="dots"><span></span><span></span><span></span></div>
    Analizando tu texto con IA…
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div id="results">
    <div class="result-card card-idea1">
      <div class="card-tag">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Idea Principal
      </div>
      <div class="card-content" id="idea1"></div>
    </div>

    <div class="result-card card-idea2">
      <div class="card-tag">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Idea Secundaria
      </div>
      <div class="card-content" id="idea2"></div>
    </div>

    <div class="result-card card-resumen">
      <div class="card-tag">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Resumen
      </div>
      <div class="card-content" id="resumen"></div>
    </div>

    <div class="result-actions">
      <button class="btn-ghost" onclick="copyAll()">Copiar todo</button>
      <button class="btn-ghost" onclick="clearAll()">Nuevo texto</button>
    </div>
  </div>
</main>

<footer>Impulsado por Claude · Anthropic</footer>

<script>
  function updateCount() {
    const len = document.getElementById('inputText').value.length;
    document.getElementById('charCount').textContent = len.toLocaleString('es') + ' caracteres';
  }

  async function summarize() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) return;

    const btn = document.getElementById('summarizeBtn');
    const loader = document.getElementById('loader');
    const results = document.getElementById('results');
    const errorMsg = document.getElementById('errorMsg');

    btn.disabled = true;
    loader.classList.add('visible');
    results.classList.remove('visible');
    errorMsg.classList.remove('visible');

    const prompt = `Analiza el siguiente texto y proporciona EXACTAMENTE esto en formato JSON (sin markdown, sin explicaciones extra, solo JSON puro):

{
  "idea_principal": "La idea o tesis central del texto en 1-2 oraciones claras.",
  "idea_secundaria": "Una idea de apoyo o complementaria importante en 1-2 oraciones.",
  "resumen": "Un resumen fluido y completo del texto en 3-5 oraciones."
}

TEXTO A ANALIZAR:
"""
${text}
"""

Responde ÚNICAMENTE con el JSON, sin ningún texto adicional.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');
      const cleaned = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);

      document.getElementById('idea1').textContent = parsed.idea_principal;
      document.getElementById('idea2').textContent = parsed.idea_secundaria;
      document.getElementById('resumen').textContent = parsed.resumen;

      results.classList.add('visible');
    } catch (err) {
      errorMsg.textContent = 'Ocurrió un error al procesar el texto. Por favor intenta de nuevo.';
      errorMsg.classList.add('visible');
    } finally {
      btn.disabled = false;
      loader.classList.remove('visible');
    }
  }

  function copyAll() {
    const i1 = document.getElementById('idea1').textContent;
    const i2 = document.getElementById('idea2').textContent;
    const r  = document.getElementById('resumen').textContent;
    const full = `IDEA PRINCIPAL:\n${i1}\n\nIDEA SECUNDARIA:\n${i2}\n\nRESUMEN:\n${r}`;
    navigator.clipboard.writeText(full).then(() => {
      const btn = document.querySelector('.result-actions .btn-ghost');
      const orig = btn.textContent;
      btn.textContent = '¡Copiado!';
      setTimeout(() => btn.textContent = orig, 2000);
    });
  }

  function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('results').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('visible');
    updateCount();
    document.getElementById('inputText').focus();
  }

  // Allow Ctrl+Enter to submit
  document.getElementById('inputText').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') summarize();
  });
</script>
</body>
</html>
